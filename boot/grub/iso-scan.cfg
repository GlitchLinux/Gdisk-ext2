# ╔══════════════════════════════════════════════════╗
# ║  gLiTcH ISO Scanner v3 (speed-optimized)         ║
# ║  Loaded via: configfile /boot/grub/iso-scan.cfg  ║
# ║  Generated by build_iso_scan.py                  ║
# ╚══════════════════════════════════════════════════╝
#
# Boot strategy (in order of preference):
#   1. loopback.cfg in the ISO  — works for most modern Ubuntu/Mint/Garuda/Manjaro/
#                                 Kali/Elementary/Zorin/KDE neon/Peppermint
#   2. Distro-family kernel/initrd detection with correct boot args
#   3. EFI chainload fallback
# WIM/WinPE: separate scanner using wimboot (requires extracted Windows files
#            on a partition: /sources/boot.wim + /bootmgr).
#
# Speed: pre-flight directory check skips empty/non-Linux partitions before
# running 25 expensive globs. NTFS root scans are skipped (Windows MFT walk
# is pathologically slow; ISOs are virtually never at NTFS root anyway —
# put them in /Distros/, /Linux-ISO/, /Downloads/, etc.).

insmod loopback
insmod iso9660
insmod ext2
insmod ntfs
insmod fat
insmod exfat
insmod part_gpt
insmod part_msdos
insmod regexp
insmod linux
insmod chain
insmod probe
insmod search

# THEME
background_image -m stretch /boot/grub/grub.png
set theme=/boot/grub/theme-iso.cfg
set color_normal=white/black
set color_highlight=white/black
# /THEME

set iso_scan_root=$root

echo " "
echo " Scanning partitions for iso files "
echo " "
echo " This can take time - Stay patient "
echo " "

# ─────────────────────────────────────────────────────────────────────────────
# try_boot_iso — shared boot-method detection (unchanged from v2)
# ─────────────────────────────────────────────────────────────────────────────
function try_boot_iso {
    set root="$4"
    set iso_dev="$1"
    set iso_path="$2"
    set iso_uuid="$3"
    insmod loopback
    insmod iso9660
    insmod linux
    insmod chain
    insmod probe

    loopback loop "($iso_dev)$iso_path"

    # Strategy 1: loopback.cfg / loopback2.cfg — distro's own GRUB config
    if [ -f (loop)/boot/grub/loopback.cfg ]; then
        echo "Booting via /boot/grub/loopback.cfg ..."
        root=(loop)
        configfile /boot/grub/loopback.cfg
        loopback --delete loop
        return 0
    elif [ -f (loop)/boot/grub2/loopback.cfg ]; then
        echo "Booting via /boot/grub2/loopback.cfg ..."
        root=(loop)
        configfile /boot/grub2/loopback.cfg
        loopback --delete loop
        return 0
    fi

    probe --label --set=cd_label (loop)
    if [ -z "$cd_label" ]; then set cd_label="UNKNOWN"; fi

    # Strategy 2: distro-family kernel/initrd patterns
    if [ -f (loop)/casper/vmlinuz ]; then
        linux (loop)/casper/vmlinuz boot=casper iso-scan/filename=$iso_path apparmor=0 noprompt noeject quiet splash ---
        initrd (loop)/casper/initrd
    elif [ -f (loop)/live/vmlinuz ]; then
        linux (loop)/live/vmlinuz boot=live findiso=$iso_path noprompt noeject quiet splash ---
        initrd (loop)/live/initrd.img
    elif [ -f (loop)/live/vmlinuz1 ]; then
        linux (loop)/live/vmlinuz1 boot=live findiso=$iso_path from=hd,usb fromiso=$iso_path quiet splash
        initrd (loop)/live/initrd1.img
    elif [ -f (loop)/isolinux/vmlinuz ]; then
        linux (loop)/isolinux/vmlinuz iso-scan/filename=$iso_path root=live:CDLABEL=$cd_label rd.live.image quiet ---
        initrd (loop)/isolinux/initrd.img
    elif [ -f (loop)/images/pxeboot/vmlinuz ]; then
        linux (loop)/images/pxeboot/vmlinuz iso-scan/filename=$iso_path root=live:CDLABEL=$cd_label rd.live.image inst.stage2=hd:LABEL=$cd_label quiet ---
        initrd (loop)/images/pxeboot/initrd.img
    elif [ -f (loop)/sysresccd/boot/x86_64/vmlinuz ]; then
        linux (loop)/sysresccd/boot/x86_64/vmlinuz img_dev=/dev/disk/by-uuid/$iso_uuid img_loop=$iso_path archisobasedir=sysresccd archisolabel=$cd_label
        initrd (loop)/sysresccd/boot/intel_ucode.img (loop)/sysresccd/boot/amd_ucode.img (loop)/sysresccd/boot/x86_64/sysresccd.img
    elif [ -f (loop)/arch/boot/x86_64/vmlinuz-linux ]; then
        linux (loop)/arch/boot/x86_64/vmlinuz-linux img_dev=/dev/disk/by-uuid/$iso_uuid img_loop=$iso_path archisobasedir=arch archisolabel=$cd_label cow_spacesize=10G earlymodules=loop modules-load=loop rd.modules-load=loop
        if [ -f (loop)/arch/boot/x86_64/initramfs-linux.img ]; then
            initrd (loop)/arch/boot/intel-ucode.img (loop)/arch/boot/amd-ucode.img (loop)/arch/boot/x86_64/initramfs-linux.img
        elif [ -f (loop)/arch/boot/x86_64/archiso.img ]; then
            initrd (loop)/arch/boot/intel-ucode.img (loop)/arch/boot/amd-ucode.img (loop)/arch/boot/x86_64/archiso.img
        fi
    elif [ -f (loop)/antiX/vmlinuz ]; then
        linux (loop)/antiX/vmlinuz from=hd,usb fromiso=$iso_path quiet splash
        initrd (loop)/antiX/initrd.gz
    elif [ -f (loop)/boot/vmlinuz-x86_64 ]; then
        linux (loop)/boot/vmlinuz-x86_64 img_dev=/dev/disk/by-uuid/$iso_uuid img_loop=$iso_path misobasedir=manjaro misolabel=$cd_label earlymodules=loop
        initrd (loop)/boot/initramfs-x86_64.img
    elif [ -f (loop)/boot/x86_64/loader/linux ]; then
        linux (loop)/boot/x86_64/loader/linux iso-scan/filename=$iso_path root=live:CDLABEL=$cd_label rd.live.image install=hd:$iso_path splash=silent quiet ---
        initrd (loop)/boot/x86_64/loader/initrd
    elif [ -f (loop)/boot/kernel ]; then
        linux (loop)/boot/kernel root=live:CDLABEL=$cd_label ro rd.luks=0 rd.md=0 rd.live.overlay.overlayfs=1 quiet splash
        initrd (loop)/boot/initrd.img
    elif [ -f (loop)/boot/vmlinuz ]; then
        linux (loop)/boot/vmlinuz iso-scan/filename=$iso_path quiet splash ---
        if [ -f (loop)/boot/initrd.img ]; then
            initrd (loop)/boot/initrd.img
        elif [ -f (loop)/boot/initrd ]; then
            initrd (loop)/boot/initrd
        elif [ -f (loop)/boot/initrd.gz ]; then
            initrd (loop)/boot/initrd.gz
        fi
    elif [ -f (loop)/EFI/BOOT/BOOTX64.EFI ]; then
        echo "Chainloading EFI bootloader from ISO..."
        chainloader (loop)/EFI/BOOT/BOOTX64.EFI
    elif [ -f (loop)/efi/boot/bootx64.efi ]; then
        echo "Chainloading EFI bootloader from ISO..."
        chainloader (loop)/efi/boot/bootx64.efi
    else
        echo "ERROR: Could not detect a known boot method."
        echo "ISO root contents:"
        ls (loop)/
        echo ""
        echo "ISO /boot contents (if any):"
        ls (loop)/boot/
        echo ""
        echo "Press any key to return..."
        sleep --interruptible 9999
    fi
}

# ─────────────────────────────────────────────────────────────────────────────
# try_boot_wim — Windows PE / Win10 Installer via wimboot (unchanged from v2)
# ─────────────────────────────────────────────────────────────────────────────
function try_boot_wim {
    set part_dev="$1"
    set scan_root="$2"

    if [ "${grub_platform}" == "efi" ]; then
        if [ -f ($part_dev)/efi/microsoft/boot/bootx64.efi ]; then
            set root=($part_dev)
            chainloader /efi/microsoft/boot/bootx64.efi
        elif [ -f ($part_dev)/efi/boot/bootx64.efi ]; then
            set root=($part_dev)
            chainloader /efi/boot/bootx64.efi
        else
            echo "ERROR: No bootx64.efi found on ($part_dev)"
            sleep --interruptible 9999
        fi
    else
        set root="$scan_root"
        if [ -f /boot/grub/wimboot ]; then
            linux16 /boot/grub/wimboot
        elif [ -f /wimboot ]; then
            linux16 /wimboot
        else
            echo "ERROR: wimboot binary not found at /boot/grub/wimboot or /wimboot"
            echo "Download: https://git.ipxe.org/release/wimboot/wimboot-2.6.0-signed.tar.bz2"
            sleep --interruptible 9999
        fi
        if [ -f ($part_dev)/boot/bootmgr ]; then
            initrd16 \
                newc:bootmgr:($part_dev)/boot/bootmgr \
                newc:bcd:($part_dev)/boot/bcd \
                newc:boot.sdi:($part_dev)/boot/boot.sdi \
                newc:boot.wim:($part_dev)/sources/boot.wim
        elif [ -f ($part_dev)/bootmgr ]; then
            initrd16 \
                newc:bootmgr:($part_dev)/bootmgr \
                newc:bcd:($part_dev)/boot/bcd \
                newc:boot.sdi:($part_dev)/boot/boot.sdi \
                newc:boot.wim:($part_dev)/sources/boot.wim
        else
            echo "ERROR: Required Windows files not found on ($part_dev)"
            echo "Expected: /bootmgr (or /boot/bootmgr), /boot/bcd, /boot/boot.sdi, /sources/boot.wim"
            sleep --interruptible 9999
        fi
    fi
}


