if loadfont /boot/grub/font.pf2 ; then
    set gfxmode=auto
    insmod gfxterm
    insmod video_bochs
    insmod video_cirrus
    terminal_output gfxterm
fi
insmod png
background_image -m stretch /boot/grub/grub.png
set timeout=5
set default=0
set theme=/boot/grub/theme.cfg
set color_normal=white/black
set color_highlight=cyan/black

# ISO Scanner — sourced inline so entries appear directly in this menu
source /boot/grub/iso-scan.cfg

### System Controls ###

menuentry "Shutdown" {
    halt
}
menuentry "Reboot" {
    reboot
}

menuentry "[←]" {
    configfile /boot/grub/grub.cfg
}