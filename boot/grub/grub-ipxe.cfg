if loadfont /boot/grub/font.pf2 ; then
    set gfxmode=auto
    insmod gfxterm
    insmod video_bochs
    insmod video_cirrus
    terminal_output gfxterm
fi
insmod png
background_image -m stretch /boot/grub/grub.png
set theme=/boot/grub/theme-ipxe.cfg
set timeout=5
set default=0

# Detect boot mode
if [ "${grub_platform}" == "efi" ]; then
    set boot_mode="UEFI"
else
    set boot_mode="BIOS"
fi

if [ "${grub_platform}" == "efi" ]; then
menuentry "Glitch iPXE [UEFI]" {
    insmod part_msdos
    insmod fat
    chainloader /EFI/iPXE/Glitch-iPXE.efi
}
else
    menuentry "Glitch iPXE [BIOS]" {
        insmod part_msdos
        insmod fat
        linux16 /boot/grub/images/memdisk iso
        initrd16 /boot/grub/images/gLiTcH-iPXE.iso
    }
fi

if [ "${grub_platform}" == "efi" ]; then
menuentry "Ventoy iPXE [UEFI]" {
    insmod part_msdos
    insmod fat
    chainloader /EFI/iPXE/Mini-Ventoy-ipxe.efi
}
else
    menuentry "Ventoy iPXE [BIOS]" {
        insmod part_msdos
        insmod fat
        linux16 /boot/grub/images/memdisk iso
        initrd16 /boot/grub/images/Mini-Ventoy-iPXE.iso
    }
fi

menuentry "[←]" {
    configfile /boot/grub/grub.cfg
}