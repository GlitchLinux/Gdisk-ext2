# ╔════════════════════════════════════════════════════╗
# ║  vDiskChain - Dynamic Boot Menu                    ║
# ║  Auto-scans all partitions for .vtoy disk images   ║
# ║                                                    ║
# ║  Place this as /boot/grub/vdiskchain.cfg           ║
# ║  Reference from main grub.cfg with:                ║
# ║    menuentry "vDiskChain - Disk Image Booting" {   ║
# ║        configfile /boot/grub/vdiskchain.cfg        ║
# ║    }                                               ║
# ║                                                    ║
# ║  https://github.com/ventoy/vdiskchain              ║
# ╚════════════════════════════════════════════════════╝

insmod regexp

# ── Theme / Display ─────────────────────────────────────────────────
if loadfont /boot/grub/font.pf2 ; then
    set gfxmode=auto
    insmod gfxterm
    terminal_output gfxterm
fi
insmod png
if [ -f /boot/grub/grub.png ]; then
    background_image -m stretch /boot/grub/grub.png
fi

set theme=/boot/grub/theme-vtoy.cfg
set timeout=15
set default=0
set color_normal=white/black
set color_highlight=white/black

# ── Scan Function ───────────────────────────────────────────────────
# GRUB2 cannot do true recursive directory walks, but we can search
# for files by name across all detected partitions using "search".
# Strategy: iterate known disk/partition combos, look for *.vtoy
# files in the root and one level deep.

set vtoy_found=0

# Scan up to 8 disks, up to 8 partitions each
# Covers hd0-hd7 with msdos1-4 and gpt1-8
for disk in 0 1 2 3 4 5 6 7; do
    for partnum in 1 2 3 4 5 6 7 8; do

        # Try GPT naming first, fall back to msdos
        for partscheme in gpt msdos; do
            set trypart="(hd${disk},${partscheme}${partnum})"

            # Test if partition exists by trying to read it
            if [ -d "${trypart}/" ]; then

                # ── Scan root of partition ──────────────────────────
                for vtoyfile in ${trypart}/*.vtoy; do
                    if [ -f "${vtoyfile}" ]; then
                        # Extract just the filename from the full path
                        regexp --set=1:vtoy_path '^\([^)]+\)(.+)$' "${vtoyfile}"

                        # Build a clean display name from filename
                        regexp --set=1:vtoy_basename '/([^/]+)$' "${vtoy_path}"

                        set vtoy_found=1

                        # UEFI boot entry
                        if [ "${grub_platform}" = "efi" ]; then
                            menuentry "${vtoy_basename}  [${trypart}]" "${vtoy_path}" {
                                set vdisk_path="${2}"
                                insmod chain
                                chainloader /boot/grub/vdiskchain/vdiskchain vdisk=${vdisk_path}
                                boot
                            }
                        fi

                        # BIOS boot entry
                        if [ "${grub_platform}" = "pc" ]; then
                            menuentry "${vtoy_basename}  [${trypart}]" "${vtoy_path}" {
                                set vdisk_path="${2}"
                                linux16 /boot/grub/vdiskchain/vdisk.krn vdisk=${vdisk_path}
                                initrd16 /boot/grub/vdiskchain/vdiskchain
                                boot
                            }
                        fi
                    fi
                done

                # ── Scan one directory deep ─────────────────────────
                for subdir in ${trypart}/*/; do
                    if [ -d "${subdir}" ]; then
                        for vtoyfile in ${subdir}*.vtoy; do
                            if [ -f "${vtoyfile}" ]; then
                                regexp --set=1:vtoy_path '^\([^)]+\)(.+)$' "${vtoyfile}"
                                regexp --set=1:vtoy_basename '/([^/]+)$' "${vtoy_path}"

                                set vtoy_found=1

                                if [ "${grub_platform}" = "efi" ]; then
                                    menuentry "${vtoy_basename}  [${trypart}]" "${vtoy_path}" {
                                        set vdisk_path="${2}"
                                        insmod chain
                                        chainloader /boot/grub/vdiskchain/vdiskchain vdisk=${vdisk_path}
                                        boot
                                    }
                                fi

                                if [ "${grub_platform}" = "pc" ]; then
                                    menuentry "${vtoy_basename}  [${trypart}]" "${vtoy_path}" {
                                        set vdisk_path="${2}"
                                        linux16 /vdisk.krn vdisk=${vdisk_path}
                                        initrd16 /boot/grub/vdiskchain/vdiskchain
                                        boot
                                    }
                                fi
                            fi
                        done
                    fi
                done

            fi
        done
    done
done

# ── No images found ─────────────────────────────────────────────────
if [ "${vtoy_found}" = "0" ]; then
    menuentry "No .vtoy disk images found!" {
        echo ""
        echo "  No .vtoy disk image files were found on any partition."
        echo ""
        echo "  To use vDiskChain:"
        echo "    1. Create a raw disk image (.img) with a Linux install"
        echo "    2. Rename it with .vtoy extension: mylinux.img.vtoy"
        echo "    3. Place it on any FAT32/NTFS/exFAT/ext4 partition"
        echo "    4. Reboot and select this menu again"
        echo ""
        sleep --interruptible 9999
    }
fi

# ── Navigation ──────────────────────────────────────────────────────

menuentry "[←]" {
    configfile /boot/grub/grub.cfg
}