# ╔═════════════════════════════════╗
# ║  GDISK GRUB2 - LINUX LIVE BOOT  ║
# ╚═════════════════════════════════╝

if loadfont /boot/grub/font.pf2 ; then
    set gfxmode=auto
    insmod gfxterm
    insmod video_bochs
    insmod video_cirrus
    terminal_output gfxterm
fi
insmod png
background_image -m stretch /boot/grub/grub.png
set timeout=5
set default=0
set theme=/boot/grub/theme-linux.cfg
set color_normal=white/black
set color_highlight=white/black

### Live Boot Entries ###

if [ "${grub_platform}" = "efi" ]; then
    menuentry "Glitch Linux - Live" {
        linux /live/vmlinuz boot=live config quiet splash
        initrd /live/initrd.img
    }
    menuentry "Glitch Linux - Boot to RAM" {
        linux /live/vmlinuz boot=live config quiet splash toram=filesystem.squashfs
    	initrd /live/initrd.img
    }
    menuentry "Glitch Linux - iPXE Netboot" {
        insmod part_msdos
        insmod fat
        chainloader /EFI/iPXE/Glitch-Linux-v27-ipxe.efi
    }
    menuentry "Glitch Linux - Encrypted Persistence" {
        linux /live/vmlinuz boot=live components quiet splash persistent=cryptsetup persistence-encryption=luks persistence
        initrd /live/initrd.img
    }
    menuentry "Glitch Linux - Unencrypted Persistence" {
        linux /live/vmlinuz boot=live components quiet splash persistence
        initrd /live/initrd.img
    }
    menuentry "Glitch Linux - Boot to RAM with Encrypted Persistence" {
        linux /live/vmlinuz boot=live components quiet splash toram=filesystem.squashfs persistent=cryptsetup persistence-encryption=luks persistence
    	initrd /live/initrd.img
    }
fi
if [ "${grub_platform}" = "pc" ]; then
    menuentry "Glitch Linux - Live" {
        linux /live/vmlinuz boot=live config quiet splash
        initrd /live/initrd.img
    }
    menuentry "Glitch Linux - Boot to RAM" {
        linux /live/vmlinuz boot=live config quiet splash toram=filesystem.squashfs
        initrd /live/initrd.img
    }
    menuentry "Glitch Linux - iPXE Netboot" {
        insmod part_msdos
        insmod fat
        linux16 /boot/grub/images/memdisk iso
        initrd16 /boot/grub/images/Glitch-Linux-v27-iPXE.iso
    }
    menuentry "Glitch Linux - Encrypted Persistence" {
        linux /live/vmlinuz boot=live components quiet splash persistent=cryptsetup persistence-encryption=luks persistence
        initrd /live/initrd.img
    }
    menuentry "Glitch Linux - Unencrypted Persistence" {
        linux /live/vmlinuz boot=live components quiet splash persistence
        initrd /live/initrd.img
    }
    menuentry "Glitch Linux - Boot to RAM with Encrypted Persistence" {
        linux /live/vmlinuz boot=live components quiet splash toram=filesystem.squashfs persistent=cryptsetup persistence-encryption=luks persistence
    	initrd /live/initrd.img
    }
fi
menuentry "[←]" {
    configfile /boot/grub/grub.cfg
}